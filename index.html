<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robeli Stays</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <div class="logo">Robeli Stays</div>
    <nav>
      <ul>
        <li><a href="#">Explorar</a></li>
        <li><a href="#">Ofertas</a></li>
        <li><a href="#">Iniciar sesión</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Encuentra tu lugar ideal en Cancún</h1>
    <input type="text" placeholder="¿A dónde quieres ir?" />
  </section>

  <section class="properties">
    <div class="card">
      <img src="img/casa1.jpg" alt="Casa en Cancún" />
      <div class="info">
        <h3>Casa moderna cerca del mar</h3>
        <p>$1,200 MXN por noche · ⭐ 4.8 (32 reseñas)</p>
      </div>
    </div>
    <!-- Repite más cards aquí -->
  </section>

  <footer>
    <p>© 2025 Robeli Real Estate</p>
  </footer>

</html>
